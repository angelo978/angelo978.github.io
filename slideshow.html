<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Slideshow Pinguino</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; color: #0f0; font-family: monospace; overflow: hidden; }
  #container { display: flex; flex-direction: column; height: 100%; width: 100%; justify-content: center; align-items: center; }
  #title { margin-bottom: 20px; font-size: 2vw; text-shadow: 0 0 10px #0f0; }
  
  /* Area immagine e controlli */
  .display-area { display: flex; align-items: center; gap: 20px; height: 70%; }
  #fotoPinguino { max-width: 70vw; max-height: 100%; object-fit: contain; border: 2px solid #0f0; box-shadow: 0 0 20px #0f0; }
  
  /* Bottoni */
  button { background: transparent; color: #0f0; border: 2px solid #0f0; padding: 10px 20px; font-size: 2vw; cursor: pointer; text-shadow: 0 0 10px #0f0; }
  button:hover { background: #0f0; color: #000; }

  #status { margin-top: 15px; font-size: 2vw; text-shadow: 0 0 10px #0f0; min-height: 2vw; }
  a { color: #0f0; margin-top: 20px; text-decoration: none; font-size: 1.5vw; text-shadow: 0 0 10px #0f0; }
</style>
</head>
<body>

<div id="container">
  <div id="title">🎞 Viaggio del Pinguino</div>
  
  <div class="display-area">
    <button onclick="cambiaFoto(-1)">⬅</button>
    <img id="fotoPinguino" src="" alt="FINE">
    <button onclick="cambiaFoto(1)">➡</button>
  </div>

  <div id="status"></div>
  <a href="index.html">⬅ Torna alla Home</a>
</div>

<script>
  let index = 0;
  // Assicurati che qui ci siano solo gli 9 file che hai effettivamente
  const listaFoto = [
    "foto/pinguino0.png",
    "foto/pinguino1.png",
    "foto/pinguino2.png",
    "foto/pinguino3.png",
    "foto/pinguino4s.png",
    "foto/pinguino5.png",
    "foto/pinguino6.png",
    "foto/pinguino7.png",
    "foto/pinguino8.png",
    "foto/pinguino9.png"
  ];

  function mostraFoto() {
    const imgElement = document.getElementById("fotoPinguino");
    const statusElement = document.getElementById("status");

    imgElement.src = listaFoto[index];
    imgElement.style.display = "block";
    // Ora segnerà 1 di 8, 2 di 8... fino a 8 di 8
    statusElement.innerText = `Foto ${index + 1} di ${listaFoto.length}`;
  }

  function cambiaFoto(direzione) {
    index += direzione;
    
    // Con questo controllo, se sei all'ultima (7) e premi avanti, torni alla prima (0)
    if (index >= listaFoto.length) index = 0;
    if (index < 0) index = listaFoto.length - 1;
    
    mostraFoto();
  }

  mostraFoto();
</script>

</body>
</html>
