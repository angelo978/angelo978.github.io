<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Angelo978 – Orologio e Countdown</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: #000;
    color: #0f0;
    font-family: monospace;
  }

  #container {
    display: flex;
    height: 100%;
    width: 100%;
  }

  /* SINISTRA: Pinguino */
  #left {
    width: 50%;
    min-width: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    border-right: 2px solid #0f0;
    overflow: hidden;
  }

  #left img {
    width: 90%;
    height: auto;
    max-height: 90%;
    object-fit: contain;
    border: 3px solid #0f0;
    border-radius: 10px;
    box-shadow: 0 0 20px #0f0;
  }

  /* DESTRA: Orologio + Countdown */
  #right {
    width: 50%;
    min-width: 50%;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    padding-top: 4vh;
  }

  #clock {
    font-size: 3.5vw; /* RIDOTTO per non rompere il layout */
    letter-spacing: 4px;
    text-shadow: 0 0 20px #0f0;
    margin-bottom: 20px;
  }

  #countdown {
    font-size: 1.8vw; /* RIDOTTO */
    text-shadow: 0 0 10px #0f0;
  }
</style>
</head>

<body>

<div id="container">

  <div id="left">
    <img src="pinguino.png" alt="Pinguino del giorno">
  </div>

  <div id="right">
    <div id="clock">00:00:00</div>
    <div id="countdown">🎄 Meno 000 Giorni a Natale</div>
  </div>

</div>

  const now = new Date();
  const h = String(now.getHours()).padStart(2, "0");
  const m = String(now.getMinutes()).padStart(2, "0");
  const s = String(now.getSeconds()).padStart(2, "0");
  document.getElementById("clock").textContent = `${h}:${m}:${s}`;
}
