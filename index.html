<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Angelo978 – Orologio e Countdown</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #000;
    color: #0f0;
    font-family: monospace;
    overflow: hidden; /* niente scroll su PC */
  }

  /* MENU IN CIMA */
  #topmenu {
    width: 100%;
    text-align: center;
    padding: 20px 0;
    background: #000;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 999;
  }

  #topmenu a {
    color: #0f0;
    text-decoration: none;
    margin: 0 30px;
    font-size: 2vw;
    text-shadow: 0 0 10px #0f0;
  }

  /* CONTENITORE PRINCIPALE */
  #container {
    display: flex;
    height: 100%;
    width: 100%;
    margin-top: 80px; /* spazio per il menu */
  }

  /* SINISTRA: PINGUINO */
  #left {
    width: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  #left img {
    max-width: 90%;
    max-height: 90%;
    object-fit: contain;
  }

  /* DESTRA: OROLOGIO + COUNTDOWN */
  #right {
    width: 50%;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    padding-top: 4vh;
    overflow: hidden;
  }

  #clock {
    font-size: 4vw;
    text-shadow: 0 0 20px #0f0;
    margin-bottom: 20px;
  }

  #count1 {
    font-size: 2.5vw;
    text-shadow: 0 0 10px #0f0;
  }

  #count2 {
    font-size: 2vw;
    text-shadow: 0 0 10px #0f0;
    margin-top: 5px;
  }

  /* SMARTPHONE */
  @media (max-width: 800px) {

    html, body {
      overflow: auto; /* sul telefono scroll ok */
    }

    #container {
      flex-direction: column;
      height: auto;
    }

    #left, #right {
      width: 100%;
    }

    #clock {
      font-size: 12vw;
    }

    #count1 {
      font-size: 7vw;
    }

    #count2 {
      font-size: 6vw;
    }

    #left img {
      max-height: 50vh;
    }

    #topmenu a {
      font-size: 6vw;
      margin: 0 15px;
    }
  }
</style>
</head>

<body>

<!-- MENU IN CIMA -->
<div id="topmenu">
  <a href="storia.html">Storia</a>
  <a href="episodi.html">Episodi</a>
  <a href="special.html">Special</a>
</div>

<div id="container">

  <div id="left">
    <img src="pinguino.png" alt="Pinguino del giorno">
  </div>

  <div id="right">
    <div id="clock">00:00:00</div>
    <div id="count1">🎄 Meno 000</div>
    <div id="count2">Giorni a Natale</div>
  </div>

</div>

<script>
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, "0");
  const m = String(now.getMinutes()).padStart(2, "0");
  const s = String(now.getSeconds()).padStart(2, "0");
  document.getElementById("clock").textContent = `${h}:${m}:${s}`;
}

function updateCountdown() {
  const today = new Date();
  const christmas = new Date(today.getFullYear(), 11, 25);
  const diff = Math.ceil((christmas - today) / (1000 * 60 * 60 * 24));

  document.getElementById("count1").textContent = `🎄 Meno ${diff}`;
  document.getElementById("count2").textContent = `Giorni a Natale`;
}

setInterval(updateClock, 1000);
updateClock();
updateCountdown();
setInterval(updateCountdown, 1000 * 60 * 60);
</script>

</body>
</html>
