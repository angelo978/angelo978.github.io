<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Angelo978 – Orologio e Countdown</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #000;
    color: #0f0;
    font-family: monospace;
    overflow: hidden; /* niente scroll su PC */
  }

  /* CONTENITORE PRINCIPALE */
  #container {
    display: flex;
    height: 100%;
    width: 100%;
  }

  /* SINISTRA: PINGUINO */
  #left {
    width: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  #left img {
    max-width: 90%;
    max-height: 90%;
    object-fit: contain;
  }

  /* DESTRA: OROLOGIO + COUNTDOWN */
  #right {
    width: 50%;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    padding-top: 4vh;
    overflow: hidden;
  }

  #clock {
    font-size: 4vw;
    text-shadow: 0 0 20px #0f0;
    margin-bottom: 20px;
  }

  #count1 {
    font-size: 2.5vw;
    text-shadow: 0 0 10px #0f0;
  }

  #count2 {
    font-size: 2vw;
    text-shadow: 0 0 10px #0f0;
    margin-top: 5px;
  }

  /* SMARTPHONE */
  @media (max-width: 800px) {

    html, body {
      overflow: auto; /* sul telefono scroll ok */
    }

    #container {
      flex-direction: column;
      height: auto;
    }

    #left, #right {
      width: 100%;
    }

    #clock {
      font-size: 12vw;
    }

    #count1 {
      font-size: 7vw;
    }

    #count2 {
      font-size: 6vw;
    }

    #left img {
      max-height: 50vh;
    }
  }
</style>
</head>

<body>

<div id="container">

  <div id="left">
    <img src="pinguino.png" alt="Pinguino del giorno">
  </div>

  <div id="right">
    <div id="clock">00:00:00</div>
    <div id="count1">🎄 Meno 000</div>
    <div id="count2">Giorni a Natale</div>
  </div>

</div>
