<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Angelo978 – Orologio e Countdown</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden; /* NESSUNO SCROLL */
    background: #000;
    color: #0f0;
    font-family: monospace;
  }

  /* Contenitore principale */
  #container {
    display: flex;
    height: 100%;
    width: 100%;
  }

  /* SINISTRA: Pinguino */
  #left {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    border-right: 2px solid #0f0;
    overflow: hidden;
  }

  #left img {
    max-width: 95%;
    max-height: 95%;
    object-fit: contain;
    border: 3px solid #0f0;
    border-radius: 10px;
    box-shadow: 0 0 20px #0f0;
  }

  /* DESTRA: Orologio + Countdown */
  #right {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-start; /* ORA STA IN ALTO */
    align-items: center;
    padding-top: 3vh; /* margine dall'alto */
    overflow: hidden;
  }

  #clock {
    font-size: 4.5vw; /* più piccolo per evitare scroll */
    letter-spacing: 4px;
    text-shadow: 0 0 20px #0f0;
    margin-bottom: 20px;
  }

  #countdown {
    font-size: 2vw; /* più piccolo per stare dentro */
    text-shadow: 0 0 10px #0f0;
    margin-top: 10px;
  }
