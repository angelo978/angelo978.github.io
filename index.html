<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Angelo978 – Orologio e Countdown</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body {
    margin: 0;
    background: #000;
    color: #0f0;
    font-family: monospace;
    height: 100vh;
    display: flex;
    flex-direction: row;
  }

  /* Contenitori principali */
  #left, #right {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* Linea divisoria */
  #left {
    border-right: 2px solid #0f0;
  }

  /* Immagine pinguino */
  #left img {
    width: 90%;
    height: auto;
    max-width: 600px;
    border: 3px solid #0f0;
    border-radius: 10px;
    box-shadow: 0 0 20px #0f0;
  }

  /* Orologio */
  #clock {
    font-size: 6vw;
    letter-spacing: 4px;
    text-shadow: 0 0 20px #0f0;
    margin-bottom: 20px;
  }

  /* Countdown */
  #countdown {
    font-size: 3vw;
    text-shadow: 0 0 10px #0f0;
  }

  /* Modalità telefono: impila tutto */
  @media (max-width: 800px) {
    body {
      flex-direction: column;
    }
    #left {
      border-right: none;
      border-bottom: 2px solid #0f0;
    }
    #clock {
      font-size: 12vw;
    }
    #countdown {
      font-size: 6vw;
    }
  }
</style>
</head>

<body>

<div id="left">
  <img src="pinguino.png" alt="Pinguino del giorno">
</div>

<div id="right">
  <div>
    <div id="clock">00:00:00</div>
    <div id="countdown">🎄 Meno 000 Giorni a Natale</div>
  </div>
</div>

<script>
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, "0");
  const m = String(now.getMinutes()).padStart(2, "0");
  const s = String(now.getSeconds()).padStart(2, "0");
  document.getElementById("clock").textContent = `${h}:${m}:${s}`;
}

function updateCountdown() {
  const today = new Date();
  const christmas = new Date(today.getFullYear(), 11, 25);
  const diff = Math.ceil((christmas - today) / (1000 * 60 * 60 * 24));
  document.getElementById("countdown").textContent =
    `🎄 Meno ${diff} Giorni a Natale`;
}

setInterval(updateClock, 1000);
updateClock();
updateCountdown();
setInterval(updateCountdown, 1000 * 60 * 60);
</script>

</body>
</html>
