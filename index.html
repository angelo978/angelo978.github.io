<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Angelo978 – Orologio e Countdown</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #000;
    color: #0f0;
    font-family: monospace;
    overflow: hidden;
  }

  /* CONTENITORE PRINCIPALE */
  #container {
    display: flex;
    height: 100%;
    width: 100%;
  }

  /* SINISTRA: MENU + TESTI */
  #left {
    width: 50%;
    display: flex;
    flex-direction: column;
    justify-content: center; /* CENTRATO */
    align-items: center;
    overflow: hidden;
  }

  /* MENU SINISTRA */
  #leftmenu {
    margin-bottom: 50px; /* DISTACCO DAL COUNTDOWN */
  }

  #leftmenu a {
    color: #0f0;
    text-decoration: none;
    margin: 0 20px;
    font-size: 2vw;
    text-shadow: 0 0 10px #0f0;
  }

  #clock {
    font-size: 4vw;
    text-shadow: 0 0 20px #0f0;
    margin-bottom: 20px;
  }

  #count1 {
    font-size: 2.5vw;
    text-shadow: 0 0 10px #0f0;
  }

  #count2 {
    font-size: 2vw;
    text-shadow: 0 0 10px #0f0;
    margin-top: 5px;
  }

  /* DESTRA: FOTO */
  #right {
    width: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  #right img {
    max-width: 90%;
    max-height: 90%;
    object-fit: contain;
    border: 2px solid #0f0;
    box-shadow: 0 0 20px #0f0;
  }

</style>
</head>

<body>

<div id="container">

  <!-- SINISTRA -->
  <div id="left">

    <!-- MENU SINISTRA -->
    <div id="leftmenu">
      <a href="storia.html">Storia</a>
      <a href="episodi.html">Episodi</a>
      <a href="special.html">Special</a>
    </div>

    <div id="clock">00:00:00</div>
    <div id="count1">🎄 Meno 000</div>
    <div id="count2">Giorni a Natale</div>
  </div>

  <!-- DESTRA -->
  <div id="right">
    <img id="fotoPinguino" src="" alt="Pinguino del giorno">
  </div>

</div>

<script>
/* OROLOGIO */
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, "0");
  const m = String(now.getMinutes()).padStart(2, "0");
  const s = String(now.getSeconds()).padStart(2, "0");
  document.getElementById("clock").textContent = `${h}:${m}:${s}`;
}

/* COUNTDOWN */
function updateCountdown() {
  const today = new Date();
  const christmas = new Date(today.getFullYear(), 11, 25);
  const diff = Math.ceil((christmas - today) / (1000 * 60 * 60 * 24));

  document.getElementById("count1").textContent = `🎄 Meno ${diff}`;
  document.getElementById("count2").textContent = `Giorni a Natale`;
}

/* FOTO AUTOMATICA */
function caricaUltimaFoto() {
  let max = 0;

  for (let i = 1; i <= 300; i++) {
    const url = `foto/pinguino${i}.png`;
    const img = new Image();
    img.src = url;

    img.onload = () => {
      if (i > max) {
        max = i;
        document.getElementById("fotoPinguino").src = url;
      }
    };
  }
}

setInterval(updateClock, 1000);
updateClock();
updateCountdown();
setInterval(updateCountdown, 1000 * 60 * 60);

caricaUltimaFoto();
</script>

</body>
</html>
