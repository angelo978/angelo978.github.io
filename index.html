<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Angelo978 – Orologio e Countdown</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #000;
    color: #0f0;
    font-family: monospace;
    overflow: hidden; /* niente scroll su PC */
  }

  #container {
    display: flex;
    height: 100%;
    width: 100%;
  }

  /* PC: due colonne */
  #left, #right {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  #left {
    border-right: 2px solid #0f0;
  }

  #left img {
    max-width: 90%;
    max-height: 90%;
    object-fit: contain;
    border: 3px solid #0f0;
    border-radius: 10px;
    box-shadow: 0 0 20px #0f0;
  }

  #right {
    flex-direction: column;
    justify-content: flex-start;
    padding-top: 5vh;
  }

  #clock {
    font-size: 4vw;
    text-shadow: 0 0 20px #0f0;
    margin-bottom: 20px;
  }

  #countdown {
    font-size: 2vw;
    text-shadow: 0 0 10px #0f0;
  }

  /* SMARTPHONE: layout verticale */
  @media (max-width: 800px) {

    html, body {
      overflow: auto; /* sul telefono lo scroll serve */
    }

    #container {
      flex-direction: column;
      height: auto;
    }

    #left {
      border-right: none;
      border-bottom: 2px solid #0f0;
      padding: 10px 0;
    }

    #left img {
      max-width: 95%;
      max-height: 50vh;
    }

    #right {
      padding-top: 20px;
    }

    #clock {
      font-size: 12vw;
    }

    #countdown {
      font-size: 6vw;
    }
  }
</style>
</head>

<body>

<div id="container">

  <div id="left">
    <img src="pinguino.png" alt="Pinguino del giorno">
  </div>

  <div id="right">
    <div id="clock">00:00:00</div>
    <div id="countdown">🎄 Meno 000 Giorni a Natale</div>
  </div>

</div>

<script>
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, "0");
  const m = String(now.getMinutes()).padStart(2, "0");
  const s = String(now.getSeconds()).padStart(2, "0");
  document.getElementById("clock").textContent = `${h}:${m}:${s}`;
}

function updateCountdown() {
  const today = new Date();
  const christmas = new Date(today.getFullYear(), 11, 25);
  const diff = Math.ceil((christmas - today) / (1000 * 60 * 60 * 24));
  document.getElementById("countdown").textContent =
    `🎄 Meno ${diff} Giorni a Natale`;
}

setInterval(updateClock, 1000);
updateClock();
updateCountdown();
setInterval(updateCountdown, 1000 * 60 * 60);
</script>

</body>
</html>
